app:
  name: xiaolanshu
  env: local
  gateway_service_name: gateway
  user_service_name: user-service
  note_service_name: note-service

http:
  host: 0.0.0.0
  port: 8080
  read_timeout_seconds: 5
  write_timeout_seconds: 10

grpc:
  host: 0.0.0.0
  user_port: 9001
  note_port: 9002
  user_target: 127.0.0.1:9001
  note_target: 127.0.0.1:9002

database:
  driver: sqlite
  dsn: data/xiaolanshu.db

mysql:
  dsn: ""
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_seconds: 3600

redis:
  addr: 127.0.0.1:6379
  username: ""
  password: ""
  db: 0
  pool_size: 10

elasticsearch:
  addresses:
    - http://127.0.0.1:9200
  username: ""
  password: ""

kafka:
  brokers:
    - 127.0.0.1:9092
  topic: xiaolanshu-events
  group_id: xiaolanshu-consumer

middleware:
  cors:
    allow_origins:
      - "*"
    allow_methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allow_headers:
      - Origin
      - Content-Type
      - Authorization
      - X-Request-ID
    allow_credentials: false
  jwt:
    secret: ""
    issuer: xiaolanshu
    expire_seconds: 7200

log:
  service: xiaolanshu
  environment: local
  level: info
  encoding: json
  file:
    enabled: true
    filename: logs/app.log
    max_size_mb: 128
    max_backups: 14
    max_age_days: 7
    compress: true
