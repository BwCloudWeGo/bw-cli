app:
  name: xiaolanshu
  env: local
  gateway_service_name: gateway
  user_service_name: user-service
  note_service_name: note-service

http:
  host: 0.0.0.0
  port: 8080
  read_timeout_seconds: 5
  write_timeout_seconds: 10

grpc:
  host: 0.0.0.0
  user_port: 9001
  note_port: 9002
  user_target: 127.0.0.1:9001
  note_target: 127.0.0.1:9002

database:
  driver: sqlite
  dsn: data/xiaolanshu.db

mysql:
  dsn: ""
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_seconds: 3600

postgresql:
  dsn: ""
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_seconds: 3600

mongodb:
  uri: mongodb://127.0.0.1:27017
  database: xiaolanshu
  app_name: bw-cli
  min_pool_size: 0
  max_pool_size: 100
  connect_timeout_seconds: 10
  server_selection_timeout_seconds: 5

file_storage:
  provider: minio
  max_size_mb: 100
  object_prefix: uploads
  public_base_url: ""
  allowed_extensions:
    - .doc
    - .docx
    - .pdf
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .bmp
    - .svg
    - .mp4
    - .mov
    - .avi
    - .mkv
    - .webm
    - .mp3
    - .wav
    - .ogg
    - .m4a
    - .flac
    - .aac
  allowed_content_types:
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/pdf
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
    - image/bmp
    - image/svg+xml
    - video/mp4
    - video/quicktime
    - video/x-msvideo
    - video/x-matroska
    - video/webm
    - audio/mpeg
    - audio/wav
    - audio/x-wav
    - audio/ogg
    - audio/mp4
    - audio/flac
    - audio/aac
  minio:
    endpoint: ""
    access_key_id: ""
    secret_access_key: ""
    bucket: ""
    region: ""
    use_ssl: false
  oss:
    endpoint: ""
    access_key_id: ""
    access_key_secret: ""
    bucket: ""
  qiniu:
    access_key: ""
    secret_key: ""
    bucket: ""
    region: ""
    use_https: true
    use_cdn_domains: false
  cos:
    secret_id: ""
    secret_key: ""
    bucket: ""
    region: ""
    bucket_url: ""

redis:
  addr: 127.0.0.1:6379
  username: ""
  password: ""
  db: 0
  pool_size: 10

elasticsearch:
  addresses:
    - http://127.0.0.1:9200
  username: ""
  password: ""

kafka:
  brokers:
    - 127.0.0.1:9092
  topic: xiaolanshu-events
  group_id: xiaolanshu-consumer

middleware:
  cors:
    allow_origins:
      - "*"
    allow_methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allow_headers:
      - Origin
      - Content-Type
      - Authorization
      - X-Request-ID
    allow_credentials: false
  jwt:
    secret: ""
    issuer: xiaolanshu
    expire_seconds: 7200

log:
  service: xiaolanshu
  environment: local
  level: info
  encoding: json
  file:
    enabled: true
    filename: logs/app.log
    max_size_mb: 128
    max_backups: 14
    max_age_days: 7
    compress: true
