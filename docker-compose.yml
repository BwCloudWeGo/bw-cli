services:
  user:
    build: .
    command: ["/app/user"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "9001:9001"

  note:
    build: .
    command: ["/app/note"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "9002:9002"

  gateway:
    build: .
    command: ["/app/gateway"]
    depends_on:
      - user
      - note
    environment:
      APP_GRPC_USER_TARGET: user:9001
      APP_GRPC_NOTE_TARGET: note:9002
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xiaolanshu
      POSTGRES_USER: bw
      POSTGRES_PASSWORD: bw-secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: bw
      MONGO_INITDB_ROOT_PASSWORD: bw-secret
      MONGO_INITDB_DATABASE: xiaolanshu
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"

volumes:
  postgres_data:
  mongodb_data:
