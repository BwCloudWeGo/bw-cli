syntax = "proto3";

package note.v1;

option go_package = "github.com/BwCloudWeGo/bw-cli/api/gen/note/v1;notev1";

service NoteService {
  rpc CreateNote(CreateNoteRequest) returns (NoteResponse);
  rpc GetNote(GetNoteRequest) returns (NoteResponse);
  rpc PublishNote(PublishNoteRequest) returns (NoteResponse);
}

message CreateNoteRequest {
  string author_id = 1;
  string title = 2;
  string content = 3;
}

message GetNoteRequest {
  string id = 1;
}

message PublishNoteRequest {
  string author_id = 1;
  string title = 2;
  string content = 3;
  // 0=图文 1=视频
  int32 note_type = 4;
  // 0=公开 1=私密
  int32 permission = 5;
  repeated string topic_ids = 6;
  int32 status = 7;
}

message NoteResponse {
  string id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  string status = 5;
  int32 note_type = 6;
  int32 permission = 7;
  string remark = 8;
  repeated string topic_ids = 9;
}
